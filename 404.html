<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | Sugar Cloud Food Truck</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { pink: '#ffb7b2', cream: '#fbf8f1', gold: '#e2a95c', blue: '#4facfe', dark: '#1f2937' }
                    },
                    fontFamily: { heading: ['Fredoka', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="antialiased transition-colors duration-300 dark:bg-slate-900 dark:text-white pt-20 flex flex-col min-h-screen">

    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 py-4 bg-white shadow-md dark:bg-slate-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="index.html" class="font-heading text-2xl font-bold text-brand-dark dark:text-white flex items-center gap-2">

        </div>

    <main class="flex-grow flex flex-col items-center justify-center py-12 px-4">
        
        <!-- SECTION 1: Animated illustration -->
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-brand-pink rounded-full mix-blend-multiply opacity-20 blur-3xl animate-pulse"></div>
            <h1 class="text-[10rem] md:text-[15rem] font-heading font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-pink to-brand-blue leading-none select-none relative z-10 animate-float">404</h1>
            <!-- Floating element -->
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white z-20 mix-blend-overlay">
                <i class="fa-solid fa-cloud text-8xl opacity-80"></i>
            </div>
        </div>

        <!-- SECTION 2: Error message -->
        <div class="text-center max-w-lg mx-auto mb-10 z-10">
            <h2 class="text-3xl font-heading font-bold text-brand-dark dark:text-white mb-4">Oh no! This cloud blew away.</h2>
            <p class="text-gray-600 dark:text-gray-400 text-lg">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        </div>

        <!-- SECTION 3: Navigation buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mb-16 z-10">
            <a href="index.html" class="bg-brand-dark dark:bg-white text-white dark:text-brand-dark px-8 py-3 rounded-full font-bold hover:bg-brand-pink dark:hover:bg-brand-pink dark:hover:text-white transition shadow-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> Back to Home
            </a>
            <a href="contact.html" class="bg-white dark:bg-slate-800 text-brand-dark dark:text-white border border-gray-200 dark:border-gray-700 px-8 py-3 rounded-full font-bold hover:bg-gray-50 dark:hover:bg-slate-700 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-envelope"></i> Contact Support
            </a>
        </div>

        <!-- SECTION 4: Suggested pages -->
        <div class="w-full max-w-3xl border-t border-gray-200 dark:border-gray-800 pt-10 text-center z-10">
            <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-6">You might want to check out</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <a href="menu.html" class="p-4 bg-brand-cream dark:bg-slate-800 rounded-2xl hover:border-brand-pink border border-transparent transition text-brand-dark dark:text-white font-medium">
                    <i class="fa-solid fa-ice-cream text-brand-pink mb-2 text-xl block"></i> Our Menu
                </a>
                <a href="services.html" class="p-4 bg-brand-cream dark:bg-slate-800 rounded-2xl hover:border-brand-blue border border-transparent transition text-brand-dark dark:text-white font-medium">
                    <i class="fa-solid fa-truck text-brand-blue mb-2 text-xl block"></i> Services
                </a>
                <a href="pricing.html" class="p-4 bg-brand-cream dark:bg-slate-800 rounded-2xl hover:border-brand-gold border border-transparent transition text-brand-dark dark:text-white font-medium">
                    <i class="fa-solid fa-tag text-brand-gold mb-2 text-xl block"></i> Pricing
                </a>
                <a href="blog.html" class="p-4 bg-brand-cream dark:bg-slate-800 rounded-2xl hover:border-brand-pink border border-transparent transition text-brand-dark dark:text-white font-medium">
                    <i class="fa-solid fa-newspaper text-brand-pink mb-2 text-xl block"></i> Blog
                </a>
            </div>
        </div>

    <footer class="bg-brand-dark py-6 text-gray-400 text-center text-sm z-10">

    </footer>

</html>
